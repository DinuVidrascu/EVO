<!doctype html>
<html lang="ro">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EvoTrack</title>

  <!-- CSS Libraries -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="manifest" href="/site.webmanifest" />

  <!-- iOS PWA meta tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EvoTrack">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <!-- Tema automată la încărcare -->
  <script>
    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }

    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(err => console.error('SW Fail:', err));
      });
    }
  </script>
</head>

<body
  class="bg-background dark:bg-slate-950 transition-colors duration-300 text-slate-700 dark:text-slate-300 font-sans h-screen flex overflow-hidden selection:bg-primary selection:text-white">
  <div id="root" class="h-full w-full flex"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
